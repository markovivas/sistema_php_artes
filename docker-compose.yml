version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: artes_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: artes
      MYSQL_USER: artes
      MYSQL_PASSWORD: artes
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: artes_pma
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"

  php:
    build: ./php
    container_name: artes_php
    restart: unless-stopped
    volumes:
      - ./site:/var/www/html

  nginx:
    image: nginx:alpine
    container_name: artes_nginx
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "80:80"
    volumes:
      - ./site:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

volumes:
  db_data:
